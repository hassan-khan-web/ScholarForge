[pytest]
# Pytest configuration for ScholarForge

# Python files to search for tests
python_files = test_*.py

# Test functions/methods/classes to search for
python_classes = Test*
python_functions = test_*

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Minimum Python version
minversion = 3.8

# Add command line options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test discovery paths
testpaths = tests

# Markers for categorizing tests
markers =
    unit: unit tests (fast)
    integration: integration tests (slower)
    slow: slow tests
    database: tests requiring database
    api: API endpoint tests
    conversion: file conversion tests

# Coverage options (if pytest-cov is installed)
# addopts = --cov=backend --cov-report=html --cov-report=term

# Timeout for tests (if pytest-timeout is installed)
# addopts = --timeout=10

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG
